<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exercises 1–4 | Giphy + Promise Analysis</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
    #gifContainer img { width: 250px; margin: 10px; border-radius: 8px; }
    button { padding: 8px 14px; border: none; background: #3498db; color: white; border-radius: 5px; cursor: pointer; }
    button:hover { background: #2980b9; }
    input { padding: 7px; width: 250px; border-radius: 5px; border: 1px solid #ccc; }
    pre { background: #222; color: #0f0; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

<h1>Exercises 1–4 (All in One Page)</h1>

<!-- ------------------------------------------------------------- -->
<!-- EXERCISE 1 : GIPHY API SEARCH -->
<!-- ------------------------------------------------------------- -->
<div class="box">
  <h2>Exercise 1 : Giphy API Search</h2>

  <form id="gifForm">
    <input type="text" id="gifInput" placeholder="Enter category (cats, dogs, funny...)" required>
    <button type="submit">Search GIFs</button>
  </form>

  <br>
  <button id="deleteBtn">Delete All GIFs</button>

  <div id="gifContainer"></div>
</div>


<!-- ------------------------------------------------------------- -->
<!-- EXERCISE 2 RESULT -->
<!-- ------------------------------------------------------------- -->
<div class="box">
  <h2>Exercise 2 : Analyze</h2>
  <pre id="out2">Waiting...</pre>
</div>

<!-- ------------------------------------------------------------- -->
<!-- EXERCISE 3 RESULT -->
<!-- ------------------------------------------------------------- -->
<div class="box">
  <h2>Exercise 3 : Analyze</h2>
  <pre id="out3">Waiting...</pre>
</div>

<!-- ------------------------------------------------------------- -->
<!-- EXERCISE 4 RESULT -->
<!-- ------------------------------------------------------------- -->
<div class="box">
  <h2>Exercise 4 : Analyze</h2>
  <pre id="out4">Waiting...</pre>
</div>


<script>
/* =========================================================================
   EXERCISE 1 : GIPHY API SEARCH
   ========================================================================= */

const API_KEY = "YOUR_GIPHY_KEY_HERE"; 
// Replace with your Giphy key from Exercises XP.

document.getElementById("gifForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const category = document.getElementById("gifInput").value;
  const container = document.getElementById("gifContainer");

  try {
    const response = await fetch(
      `https://api.giphy.com/v1/gifs/search?q=${category}&api_key=${API_KEY}&limit=6`
    );

    if (!response.ok) throw new Error("Network error: " + response.status);

    const data = await response.json();

    data.data.forEach(gif => {
      // Get the gif URL inside gif.images.original.url
      const imgUrl = gif.images.original.url;

      const img = document.createElement("img");
      img.src = imgUrl;

      container.appendChild(img);
    });

  } catch (err) {
    alert("Error fetching GIFs: " + err);
  }
});

// Delete ALL gifs
document.getElementById("deleteBtn").onclick = function() {
  document.getElementById("gifContainer").innerHTML = "";
};




/* =========================================================================
   EXERCISE 2 : ANALYZE
   ========================================================================= */

let resolveAfter2Seconds = function () {
    console.log("starting slow promise");
    return new Promise(resolve => {
        setTimeout(function () {
            resolve("slow");
            console.log("slow promise is done");
        }, 2000);
    });
};

let resolveAfter1Second = function () {
    console.log("starting fast promise");
    return new Promise(resolve => {
        setTimeout(function () {
            resolve("fast");
            console.log("fast promise is done");
        }, 1000);
    });
};

let concurrentPromise = function () {
    console.log('==CONCURRENT START with Promise.all==');

    return Promise.all([
      resolveAfter2Seconds(),
      resolveAfter1Second()
    ])
    .then(messages => {
      document.getElementById("out2").textContent =
        "OUTPUT:\n" +
        "starting slow promise\n" +
        "starting fast promise\n" +
        "fast promise is done (after 1s)\n" +
        "slow promise is done (after 2s)\n\n" +
        messages[0] + "\n" +
        messages[1];
    });
};

setTimeout(concurrentPromise, 1000);



/* =========================================================================
   EXERCISE 3 : ANALYZE
   ========================================================================= */

let parallel = async function () {
    console.log('==PARALLEL with await Promise.all==');

    await Promise.all([
        (async () => {
          let msg = await resolveAfter2Seconds();
          console.log(msg);
        })(),
        (async () => {
          let msg = await resolveAfter1Second();
          console.log(msg);
        })()
    ]);

    document.getElementById("out3").textContent =
      "OUTPUT:\n" +
      "starting slow promise\n" +
      "starting fast promise\n" +
      "fast promise is done\n" +
      "slow promise is done\n" +
      "fast\nslow";
};

setTimeout(parallel, 5000);



/* =========================================================================
   EXERCISE 4 : ANALYZE
   ========================================================================= */

let parallelPromise = function () {
    console.log('==PARALLEL with Promise.then==');

    resolveAfter2Seconds().then(message => console.log(message));
    resolveAfter1Second().then(message => console.log(message));

    document.getElementById("out4").textContent =
      "OUTPUT:\n" +
      "starting slow promise\n" +
      "starting fast promise\n" +
      "fast promise is done\n" +
      "fast\n" +
      "slow promise is done\n" +
      "slow";
};

setTimeout(parallelPromise, 13000);

</script>

</body>
</html>
