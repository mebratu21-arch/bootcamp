<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Giphy Random Search</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    #gifContainer img { width: 250px; margin-top: 10px; border-radius: 10px; }
    .gifBox {
      margin: 15px 0;
      padding: 15px;
      border: 1px solid #aaa;
      width: fit-content;
      border-radius: 10px;
      background: #f7f7f7;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #3498db;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #2980b9; }
    .deleteBtn { background: #e74c3c; }
    .deleteBtn:hover { background: #c0392b; }
  </style>
</head>

<body>

  <h2>Giphy Random API — Search GIF by Category</h2>

  <!-- Search form -->
  <form id="gifForm">
    <input type="text" id="searchInput" placeholder="Enter category (sun, cat, dog...)" required>
    <button type="submit">Get Random GIF</button>
  </form>

  <br>
  <button id="deleteAllBtn" class="deleteBtn">DELETE ALL GIFS</button>

  <!-- All GIFs will appear here -->
  <div id="gifContainer"></div>


<script>
// ======================
// GIPHY RANDOM API
// ======================

const API_KEY = "hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My";

// Form submit listener
document.getElementById("gifForm").addEventListener("submit", async function(event) {
  event.preventDefault(); // Stop form refresh

  const userSearch = document.getElementById("searchInput").value;
  const container = document.getElementById("gifContainer");

  try {
    // Fetch random GIF by category (tag)
    const response = await fetch(
      `https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}&tag=${userSearch}`
    );

    if (!response.ok) throw new Error("Network Error: " + response.status);

    const data = await response.json();

    const gifUrl = data.data.images.original.url; // Real GIF URL

    // Create GIF box
    const div = document.createElement("div");
    div.className = "gifBox";

    // Image element
    const img = document.createElement("img");
    img.src = gifUrl;

    // Delete button for THIS GIF only
    const delBtn = document.createElement("button");
    delBtn.textContent = "DELETE";
    delBtn.className = "deleteBtn";

    // Remove this GIF only
    delBtn.onclick = () => div.remove();

    // Append elements
    div.appendChild(img);
    div.appendChild(document.createElement("br"));
    div.appendChild(delBtn);

    container.appendChild(div);

  } catch (err) {
    alert("Error fetching GIF: " + err);
  }
});

// DELETE ALL GIFS
document.getElementById("deleteAllBtn").onclick = function () {
  document.getElementById("gifContainer").innerHTML = "";
};

</script>

</body>
</html>
