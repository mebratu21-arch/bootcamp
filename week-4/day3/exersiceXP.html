<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promises Exercises</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  input, button { margin: 5px 0; padding: 5px; }
  .output { margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>

<h2> Exercise 1: Compare to Ten</h2>
<input type="number" id="numInput" placeholder="Enter a number">
<button id="compareBtn">Compare</button>
<div id="compareOutput" class="output"></div>

<h2> Exercise 2: 4-Second Promise</h2>
<button id="waitBtn">Start 4-Second Promise</button>
<div id="waitOutput" class="output"></div>

<h2> Exercise 3: Resolve & Reject</h2>
<button id="resolveBtn">Resolve Promise</button>
<button id="rejectBtn">Reject Promise</button>
<div id="resolveOutput" class="output"></div>

<script>
// ---------- Exercise 1: compareToTen ----------
function compareToTen(num) {
    return new Promise((resolve, reject) => {
        if (num <= 10) {
            resolve(`${num} is less than or equal to 10`);
        } else {
            reject(`${num} is greater than 10`);
        }
    });
}

document.getElementById("compareBtn").addEventListener("click", () => {
    const num = Number(document.getElementById("numInput").value);
    compareToTen(num)
        .then(result => document.getElementById("compareOutput").textContent = result)
        .catch(error => document.getElementById("compareOutput").textContent = error);
});

// ---------- Exercise 2: 4-second promise ----------
document.getElementById("waitBtn").addEventListener("click", () => {
    const output = document.getElementById("waitOutput");
    output.textContent = "Waiting 4 seconds...";
    new Promise((resolve) => {
        setTimeout(() => resolve("success"), 4000);
    }).then(result => output.textContent = result);
});

// ---------- Exercise 3: Promise.resolve & Promise.reject ----------
document.getElementById("resolveBtn").addEventListener("click", () => {
    Promise.resolve(3)
        .then(result => document.getElementById("resolveOutput").textContent = "Resolved value: " + result);
});

document.getElementById("rejectBtn").addEventListener("click", () => {
    Promise.reject("Boo!")
        .catch(error => document.getElementById("resolveOutput").textContent = "Rejected with: " + error);
});
</script>

</body>
</html>
